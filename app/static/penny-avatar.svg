<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Penny — app avatar">
  <style>
    .p-eye { transform-box: fill-box; transform-origin: center; animation: blink 4.6s infinite; }
    .p-pupils { animation: scan 7s ease-in-out infinite; }
    .p-glint { animation: glint 6s ease-in-out infinite; }
    @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 93%,95%{transform:scaleY(.08)} 97%{transform:scaleY(1)} }
    @keyframes scan { 0%,35%,100%{transform:translateX(0)} 45%,60%{transform:translateX(-6px)} 70%,85%{transform:translateX(6px)} }
    @keyframes glint { 0%,78%,100%{transform:translateX(-84px) rotate(-20deg);opacity:0} 84%{opacity:.5} 92%{transform:translateX(104px) rotate(-20deg);opacity:0} }
    @media (prefers-reduced-motion: reduce){ .p-eye,.p-pupils,.p-glint{animation:none} }
  </style>
  <rect width="320" height="320" rx="64" fill="#E7EAF6"/>
  <path d="M 62 320 A 98 98 0 0 1 258 320 Z" fill="#242E63"/>
  <rect x="144" y="212" width="32" height="46" rx="12" fill="#FAF7F1"/>
  <path d="M 142 260 L 160 283 L 178 260 Z" fill="#FAF7F1"/>
  <path d="M 58 174 A 102 102 0 0 1 262 174 L 262 220 L 58 220 Z" fill="#16130F"/>
  <circle cx="160" cy="172" r="66" fill="#FAF7F1"/>
  <clipPath id="lensA"><rect x="109" y="153" width="46" height="40" rx="10"/><rect x="165" y="153" width="46" height="40" rx="10"/></clipPath>
  <path d="M 116 140 Q 132 133 148 140" fill="none" stroke="#16130F" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 172 140 Q 188 133 204 140" fill="none" stroke="#16130F" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="102" cy="200" r="7" fill="#F0577E" opacity="0.6"/>
  <circle cx="218" cy="200" r="7" fill="#F0577E" opacity="0.6"/>
  <rect x="109" y="153" width="46" height="40" rx="10" fill="none" stroke="#16130F" stroke-width="6"/>
  <rect x="165" y="153" width="46" height="40" rx="10" fill="none" stroke="#16130F" stroke-width="6"/>
  <path d="M 155 165 Q 160 161 165 165" fill="none" stroke="#16130F" stroke-width="6" stroke-linecap="round"/>
  <g class="p-pupils">
    <g class="p-eye"><circle cx="132" cy="174" r="8" fill="#16130F"/><circle cx="135" cy="171" r="2.8" fill="#FFFFFF"/></g>
    <g class="p-eye"><circle cx="188" cy="174" r="8" fill="#16130F"/><circle cx="191" cy="171" r="2.8" fill="#FFFFFF"/></g>
  </g>
  <g clip-path="url(#lensA)"><rect class="p-glint" x="124" y="136" width="15" height="76" fill="#FFFFFF" opacity="0"/></g>
  <path d="M 151 212 Q 160 219 169 211" fill="none" stroke="#16130F" stroke-width="5" stroke-linecap="round"/>
</svg>