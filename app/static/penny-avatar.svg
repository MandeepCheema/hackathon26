<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Penny — Controls Copilot avatar (Builder Tribe brand) -->
  <rect width="64" height="64" rx="14" fill="#A03528"/>
  <!-- shoulders -->
  <path d="M13 64 q0 -15 19 -15 q19 0 19 15 z" fill="#191A20"/>
  <!-- collar -->
  <path d="M32 50 l-4.5 6 4.5 8 4.5 -8 z" fill="#F6EFE4"/>
  <!-- hair (bob) -->
  <circle cx="32" cy="27" r="14.5" fill="#191A20"/>
  <rect x="16.5" y="26" width="7" height="18" rx="3.5" fill="#191A20"/>
  <rect x="40.5" y="26" width="7" height="18" rx="3.5" fill="#191A20"/>
  <!-- face -->
  <circle cx="32" cy="32.5" r="10.5" fill="#F6EFE4"/>
  <!-- bangs -->
  <path d="M21.5 32 a10.5 10.5 0 0 1 21 0 l0 -4 a12 12 0 0 0 -21 0 z" fill="#191A20"/>
  <!-- glasses -->
  <g stroke="#191A20" stroke-width="2" fill="none">
    <circle cx="26.8" cy="34" r="4.1"/>
    <circle cx="37.2" cy="34" r="4.1"/>
    <path d="M30.9 34 h2.2"/>
  </g>
  <circle cx="26.8" cy="34.4" r="1.3" fill="#191A20"/>
  <circle cx="37.2" cy="34.4" r="1.3" fill="#191A20"/>
  <!-- smile -->
  <path d="M29.5 41 q2.5 1.8 5 0" stroke="#191A20" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
